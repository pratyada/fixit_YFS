<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" fill="none" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#708E86"/>
      <stop offset="100%" stop-color="#4E4E53"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow behind logo -->
  <ellipse cx="600" cy="260" rx="140" ry="140" fill="white" opacity="0.08"/>

  <!-- Logo circle background -->
  <circle cx="600" cy="260" r="80" fill="white" opacity="0.15"/>
  <circle cx="600" cy="260" r="75" fill="white"/>

  <!-- Logo image -->
  <image href="https://yourformsux.com/wp-content/uploads/2024/08/cropped-Untitled-design-14-150x150.png" x="530" y="190" width="140" height="140" clip-path="circle(70px at 70px 70px)"/>

  <!-- FIXIT text -->
  <text x="600" y="420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle" letter-spacing="6">FIXIT</text>

  <!-- Tagline -->
  <text x="600" y="460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle">by Your Form Sux</text>

  <!-- Subtitle -->
  <text x="600" y="500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.4)" text-anchor="middle">AI-Powered Physio Rehab</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="rgba(255,255,255,0.1)"/>
  <text x="600" y="610" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.25)" text-anchor="middle">fixit.yourformsux.com</text>
</svg>
