<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" fill="none" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#863bff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#863bff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Glow behind lightning bolt -->
  <ellipse cx="200" cy="315" rx="120" ry="180" fill="#863bff" opacity="0.12"/>

  <!-- Lightning bolt (scaled from favicon) -->
  <g transform="translate(128, 195) scale(3)">
    <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- FIXIT text -->
  <text x="380" y="290" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="6">FIXIT</text>

  <!-- Tagline -->
  <text x="385" y="360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#a0a0b8">AI-Powered Physio Rehab</text>

  <!-- Feature pills -->
  <g transform="translate(385, 400)">
    <rect x="0" y="0" width="200" height="40" rx="20" fill="#863bff" opacity="0.2"/>
    <text x="100" y="26" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#c4a0ff" text-anchor="middle">Pose Detection</text>

    <rect x="220" y="0" width="220" height="40" rx="20" fill="#708E86" opacity="0.2"/>
    <text x="330" y="26" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#9ec4b8" text-anchor="middle">Exercise Tracking</text>

    <rect x="460" y="0" width="220" height="40" rx="20" fill="#863bff" opacity="0.2"/>
    <text x="570" y="26" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#c4a0ff" text-anchor="middle">Recovery Insights</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#863bff" opacity="0.15"/>
  <text x="600" y="618" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9080b0" text-anchor="middle">fixit.yourformsux.com</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
</svg>
